<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTM 2026 | Paramount English Medium School</title>
    <link rel="icon" type="image/png" href="School logo 2.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --header-bg: #030a1a; --gold: #c5a059; --white: #ffffff; --light-bg: #f8f9fa; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--header-bg);
            background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(2, 6, 23, 0.9); 
            backdrop-filter: blur(10px); border-bottom: 2px solid var(--gold); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 50px; }
        .name-main { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--gold); font-weight: 900; }
        .name-sub { font-size: 0.7rem; letter-spacing: 2px; }

        .registration-section { padding: 60px 5%; flex: 1; }
        .form-container { 
            max-width: 600px; margin: 0 auto; background: white; 
            color: #333; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: #334155; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: inherit; }
        
        .child-entry { 
            background: #f8fafc; padding: 15px; border-radius: 12px; 
            border-top: 3px solid var(--gold); margin-bottom: 15px; 
        }

        .submit-btn { 
            background: var(--header-bg); color: var(--gold); border: 2px solid var(--gold); 
            padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; letter-spacing: 1px;
        }
        .submit-btn:hover { background: var(--gold); color: black; }

        #successModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; 
        }
        .modal-content { 
            background: white; color: #333; padding: 30px; border-radius: 20px; 
            width: 100%; max-width: 500px; text-align: center; border: 3px solid var(--gold);
        }
        .pass-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.85rem; }
        .pass-table th { background: #f1f5f9; padding: 10px; border-bottom: 2px solid var(--gold); text-align: left; }
        .pass-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }

        /* Footer without golden line */
        footer { 
            background-color: var(--header-bg); padding: 40px 20px; 
            text-align: center; border-top: none; margin-top: auto;
        }
        .social-icons a { color: white; font-size: 24px; margin: 0 12px; transition: 0.3s; }
        .social-icons a:hover { color: var(--gold); }
        .connect-text { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 20px; letter-spacing: 2px; }

        .admin-badge {
            display: none; background: var(--gold); color: black; padding: 5px 12px;
            border-radius: 5px; font-size: 0.7rem; font-weight: 800; text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="School logo 2.png" alt="Logo" class="logo-img">
        <div class="school-name-box">
            <div class="name-main">PARAMOUNT</div>
            <div class="name-sub">ENGLISH MEDIUM SCHOOL</div>
        </div>
    </div>
    <a href="admin.html" id="adminLink" class="admin-badge">ADMIN PANEL</a>
</header>

<section class="registration-section">
    <div class="form-container">
        <h2 style="font-family: 'Cinzel'; text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 25px;">Meeting Registration</h2>
        
        <form id="ptmForm">
            <div class="form-group">
                <label>Parent Name</label>
                <input type="text" id="parentName" placeholder="Enter Full Name" required>
            </div>

            <div class="form-group">
                <label>How many children are studying here?</label>
                <select id="childCount" onchange="updateChildFields()" required>
                    <option value="1">1 Child</option>
                    <option value="2">2 Children</option>
                    <option value="3">3 Children</option>
                </select>
            </div>

            <div id="childrenContainer"></div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="tel" id="phoneNumber" placeholder="Enter Mobile Number" required>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">CONFIRM REGISTRATION</button>
        </form>
    </div>
</section>

<div id="successModal">
    <div class="modal-content">
        <div id="modalIcon" style="background: #28a745; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <i class="fas fa-check"></i>
        </div>
        <h2 id="modalTitle" style="font-family: 'Cinzel';">Registration Successful!</h2>
        <p id="modalSubtitle" style="font-size: 0.8rem; letter-spacing: 1px; color: var(--gold); font-weight: bold; margin-top: 5px;">OFFICIAL MEETING PASS</p>
        
        <div id="meetingSchedule"></div>

        <div style="background: #fffbeb; border: 1px dashed var(--gold); padding: 10px; margin: 15px 0; font-size: 0.8rem; font-weight: bold; color: #333;">
            <i class="fas fa-camera"></i> PLEASE TAKE A SCREENSHOT!
        </div>
        
        <button class="submit-btn" onclick="location.reload()">Finish</button>
    </div>
</div>

<footer>
    <div class="footer-container">
        <p style="margin-bottom: 20px; font-size: 0.8rem; opacity: 0.8;">
            &copy; 2026, Paramount English Medium School. All Rights Reserved.
        </p>
        <h3 class="connect-text">Connect with us</h3>
        <div class="social-icons">
            <a href="https://www.facebook.com/paramountschoolwgl" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/paramount.07" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com/@paramountschoolwgl" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://wa.me/919000641355" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
        authDomain: "paramount-school-d55bc.firebaseapp.com",
        databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
        projectId: "paramount-school-d55bc",
        storageBucket: "paramount-school-d55bc.firebasestorage.app",
        messagingSenderId: "130979432562",
        appId: "1:130979432562:web:4cd94787b23f9daba51aeb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Admin Access Check ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === 'true') {
        document.getElementById('adminLink').style.display = 'block';
    }

    // --- Staff Data ---
    const staffDir = {
        "Pre-KG (Diamond)": { teacher: "Ms. Sarah", room: "Room A-101" },
        "KG-1 (Ruby)": { teacher: "Ms. Aruna", room: "Room A-102" },
        "KG-2 (Amber)": { teacher: "Ms. Lakshmi", room: "Room A-103" },
        "Grade-1 (Opal)": { teacher: "Mr. David", room: "Room B-202" },
        "Grade-2 (Emerald)": { teacher: "Ms. Nirmala", room: "Room C-303" },
        "Grade-3 (Crystal)": { teacher: "Mr. Satish", room: "Room C-304" },
        "Grade-4 (Citrine)": { teacher: "Ms. Swapna", room: "Room D-401" },
        "Grade-5 (Moonstone)": { teacher: "Mr. Kiran", room: "Room D-402" },
        "Grade-6 (Alluri)": { teacher: "Ms. Fatima", room: "Science Lab" },
        "Grade-7 (Kalam)": { teacher: "Mr. Ravi", room: "Computer Lab" },
        "Grade-8 (Bhagat)": { teacher: "Ms. Mary", room: "Library Hall" }
    };

    function updateChildFields() {
        const count = document.getElementById('childCount').value;
        const container = document.getElementById('childrenContainer');
        const options = Object.keys(staffDir).map(cls => `<option value="${cls}">${cls}</option>`).join('');
        container.innerHTML = "";
        for (let i = 1; i <= count; i++) {
            container.innerHTML += `
                <div class="child-entry">
                    <label>Child ${i}: Name</label>
                    <input type="text" class="child-name" required style="margin-bottom:10px;">
                    <label>Child ${i}: Class</label>
                    <select class="child-grade" required>${options}</select>
                </div>`;
        }
    }
    updateChildFields();

    document.getElementById('ptmForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const phone = document.getElementById('phoneNumber').value;
        const parent = document.getElementById('parentName').value;
        
        btn.disabled = true; 
        btn.innerText = "Checking Records...";

        // 1. Duplicate Check
        const snapshot = await db.ref('ptm_registrations').once('value');
        let existingKey = null;

        snapshot.forEach(child => {
            if (child.val().phone === phone) {
                existingKey = child.key;
            }
        });

        if (existingKey) {
            const confirmUpdate = confirm("This mobile number is already registered. Would you like to update your details?");
            if (!confirmUpdate) {
                btn.disabled = false;
                btn.innerText = "CONFIRM REGISTRATION";
                return;
            }
            document.getElementById('modalTitle').innerText = "Details Updated!";
            document.getElementById('modalIcon').style.background = "#030a1a";
        }

        // 2. Prepare Data
        const names = document.querySelectorAll('.child-name');
        const grades = document.querySelectorAll('.child-grade');
        let studentArray = [];
        let rowsHtml = "";

        names.forEach((input, i) => {
            const grade = grades[i].value;
            const info = staffDir[grade];
            studentArray.push({ name: input.value, grade: grade });
            rowsHtml += `<tr><td><b>${input.value}</b><br>${grade}</td><td>${info.teacher}</td><td style="color:var(--gold); font-weight:bold;">${info.room}</td></tr>`;
        });

        const table = `<table class="pass-table"><thead><tr><th>Student</th><th>Teacher</th><th>Room</th></tr></thead><tbody>${rowsHtml}</tbody></table>`;

        const registrationData = {
            parentName: parent,
            phone: phone,
            students: studentArray,
            timestamp: new Date().toLocaleString()
        };

        try {
            // 3. Save / Update in Firebase
            if (existingKey) {
                await db.ref('ptm_registrations/' + existingKey).update(registrationData);
            } else {
                const newRef = db.ref('ptm_registrations').push();
                await newRef.set(registrationData);
            }

            // 4. Show Pass
            document.getElementById('meetingSchedule').innerHTML = table;
            document.getElementById('successModal').style.display = 'flex';
        } catch (error) {
            alert("Error saving data. Please check your internet connection.");
            btn.disabled = false;
            btn.innerText = "CONFIRM REGISTRATION";
        }
    });
</script>

</body>
</html>
