<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Registration | Paramount School</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Great+Vibes&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="School logo 2.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #c5a059; --navy: #030a1a; --white: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--navy);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; font-family: 'Montserrat', sans-serif;
            background-image: radial-gradient(circle at center, #1e293b 0%, #030a1a 100%);
        }

        .invitation-frame {
            width: 92%; max-width: 850px; height: 85vh;
            border: 2px solid var(--gold); position: relative;
            background: rgba(3, 10, 26, 0.6); backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }

        .scroll-content {
            flex: 1; overflow-y: auto; padding: 40px 20px; text-align: center;
            scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
        }

        .scroll-content::-webkit-scrollbar { width: 4px; }
        .scroll-content::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .school-logo { height: 80px; margin-bottom: 20px; }
        .school-name { font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 10px; }
        
        .event-title { font-family: 'Cinzel', serif; font-size: clamp(1.2rem, 4vw, 2rem); color: #fff; margin: 10px 0; letter-spacing: 2px; }

        /* Countdown wrapper from Invitation */
        .countdown-wrapper { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .count-unit { background: rgba(197, 160, 89, 0.05); border: 1px solid rgba(197, 160, 89, 0.3); padding: 10px; min-width: 60px; border-radius: 5px; }
        .count-unit span { display: block; font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--gold); font-weight: 700; }
        .count-unit label { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); }

        /* Form Styling */
        #registrationForm { max-width: 500px; margin: 0 auto; text-align: left; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 5px; }
        input, select {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 12px; border-radius: 8px; color: white; outline: none; font-family: inherit;
        }
        
        .child-entry-card {
            background: rgba(197, 160, 89, 0.05); border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 15px; border-radius: 10px; margin-bottom: 15px; animation: slideUp 0.4s ease;
        }

        .submit-btn {
            width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 50px;
            color: var(--navy); font-weight: 700; cursor: pointer; transition: 0.4s; letter-spacing: 2px; margin-top: 10px;
        }
        .submit-btn:hover { background: white; box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }

        /* Pass/Table View */
        .pass-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        .pass-table th { color: var(--gold); border-bottom: 1px solid var(--gold); padding: 10px; text-align: left; }
        .pass-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; color: #fff; }

        .footer-inner { margin-top: 50px; padding-bottom: 20px; text-align: center; }
        .connect-text { font-family: 'Cinzel', serif; color: #fff; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; margin: 20px 0 10px; }
        .social-links { display: flex; justify-content: center; gap: 20px; }
        .social-links a { color: var(--gold); font-size: 1.2rem; transition: 0.3s; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="invitation-frame">
        <div class="scroll-content" id="mainContainer">
            
            <img src="School logo 2.png" alt="Logo" class="school-logo">
            <h2 class="school-name">Paramount English Medium School</h2>
            <h1 class="event-title">EVENT REGISTRATION 2026</h1>

            <div class="countdown-wrapper">
                <div class="count-unit"><span id="days">00</span><label>Days</label></div>
                <div class="count-unit"><span id="hours">00</span><label>Hrs</label></div>
                <div class="count-unit"><span id="mins">00</span><label>Min</label></div>
                <div class="count-unit"><span id="secs">00</span><label>Sec</label></div>
            </div>

            <form id="registrationForm">
                <div class="input-group">
                    <label>Parent Name</label>
                    <input type="text" id="parentName" required placeholder="Enter full name">
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required placeholder="Enter mobile number">
                </div>

                <div class="input-group">
                    <label>How many children are studying here?</label>
                    <select id="childCount" onchange="updateChildFields()">
                        <option value="1">1 Child</option>
                        <option value="2">2 Children</option>
                        <option value="3">3 Children</option>
                        <option value="4">4 Children</option>
                    </select>
                </div>

                <div id="childrenContainer">
                    </div>

                <button type="submit" class="submit-btn">CONFIRM REGISTRATION</button>
            </form>

            <div class="footer-inner">
                <p style="font-size: 0.6rem; opacity: 0.8; letter-spacing: 2px; color: #fff;">PARAMOUNT SCHOOL • WARANGAL</p>
                <h3 class="connect-text">Connect with us</h3>
                <div class="social-links">
                    <a href="https://www.facebook.com/paramountschoolwgl" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/paramount.07" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://youtube.com/@paramountschoolwgl" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a href="https://wa.me/919000641355" target="_blank"><i class="fab fa-whatsapp"></i></a>
                </div>
                <p style="font-size: 0.5rem; opacity: 0.6; margin-top: 20px; color: #fff;">© 2026 Paramount School. All Rights Reserved.</p>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
            authDomain: "paramount-school-d55bc.firebaseapp.com",
            projectId: "paramount-school-d55bc",
            storageBucket: "paramount-school-d55bc.firebasestorage.app",
            messagingSenderId: "130979432562",
            appId: "1:130979432562:web:4cd94787b23f9daba51aeb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- Teacher/Room Mapping ---
        const classData = {
            "Pre-KG": { teacher: "Ms. Sarah", room: "Room A-101" },
            "LKG": { teacher: "Ms. Aruna", room: "Room A-102" },
            "UKG": { teacher: "Ms. Lakshmi", room: "Room A-103" },
            "Grade 1": { teacher: "Mr. David", room: "Room B-202" },
            "Grade 2": { teacher: "Ms. Nirmala", room: "Room C-303" },
            "Grade 3": { teacher: "Mr. Satish", room: "Room C-304" },
            "Grade 4": { teacher: "Ms. Swapna", room: "Room D-401" },
            "Grade 5": { teacher: "Mr. Kiran", room: "Room D-402" },
            "Grade 6": { teacher: "Ms. Fatima", room: "Lab 1" },
            "Grade 7": { teacher: "Mr. Ravi", room: "Lab 2" },
            "Grade 8": { teacher: "Ms. Mary", room: "Library Hall" }
        };

        // --- Dynamic Form Logic ---
        function updateChildFields() {
            const count = document.getElementById('childCount').value;
            const container = document.getElementById('childrenContainer');
            container.innerHTML = '';

            for(let i=1; i<=count; i++) {
                container.innerHTML += `
                    <div class="child-entry-card">
                        <label style="color:white; opacity:0.5; margin-bottom:10px;">Child ${i}</label>
                        <div class="input-group">
                            <input type="text" class="child-name" placeholder="Child's Name" required>
                        </div>
                        <div class="input-group">
                            <select class="child-grade" required>
                                <option value="" disabled selected>Select Grade</option>
                                ${Object.keys(classData).map(grade => `<option value="${grade}">${grade}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                `;
            }
        }
        updateChildFields(); // Initialize with 1

        // --- Countdown Logic ---
        const targetDate = new Date("April 30, 2026 09:30:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff > 0) {
                document.getElementById("days").innerText = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
                document.getElementById("hours").innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                document.getElementById("mins").innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                document.getElementById("secs").innerText = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            }
        }, 1000);

        // --- Submission Logic ---
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const parentName = document.getElementById('parentName').value;
            const phone = document.getElementById('phone').value;
            const names = document.querySelectorAll('.child-name');
            const grades = document.querySelectorAll('.child-grade');
            
            let students = [];
            let tableRows = '';

            names.forEach((el, index) => {
                const grade = grades[index].value;
                const info = classData[grade];
                students.push({ name: el.value, grade: grade });
                tableRows += `
                    <tr>
                        <td><b>${el.value}</b><br><small>${grade}</small></td>
                        <td>${info.teacher}</td>
                        <td style="color:var(--gold)">${info.room}</td>
                    </tr>
                `;
            });

            try {
                await db.collection("event_registrations").add({
                    parentName, phone, students,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Transform Form into "Digital Pass"
                document.getElementById('mainContainer').innerHTML = `
                    <div style="animation: slideUp 0.6s ease;">
                        <i class="fas fa-check-circle" style="font-size: 3.5rem; color: var(--gold); margin-bottom: 20px;"></i>
                        <h2 style="color:#fff;">Registration Successful</h2>
                        <p style="font-size:0.7rem; letter-spacing:2px; margin-bottom:20px;">WELCOME, ${parentName.toUpperCase()}</p>
                        
                        <div style="background:rgba(255,255,255,0.03); border:1px solid var(--gold); border-radius:15px; padding:15px; margin-bottom:30px;">
                            <p style="font-size:0.6rem; color:var(--gold); letter-spacing:2px; font-weight:bold;">MEETING SCHEDULE</p>
                            <table class="pass-table">
                                <thead>
                                    <tr><th>Student</th><th>Teacher</th><th>Venue</th></tr>
                                </thead>
                                <tbody>${tableRows}</tbody>
                            </table>
                        </div>

                        <p style="font-size:0.7rem; opacity:0.8; line-height:1.6;">Please show this digital pass at the reception desk on<br><b>April 30, 2026.</b></p>
                        
                        <button onclick="window.print()" style="background:transparent; border:1px solid var(--gold); color:var(--gold); padding:10px 25px; border-radius:50px; margin-top:30px; cursor:pointer; font-size:0.7rem;">PRINT PASS</button>
                    </div>
                `;
            } catch (err) {
                alert("Submission failed. Check your connection.");
            }
        });
    </script>
</body>
</html>
